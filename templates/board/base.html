{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{% block title %}JobBoard{% endblock %}</title>

    <!-- Tailwind CDN (ok za razvoj/demo) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 text-gray-900">

<!-- NAVBAR -->
<header class="bg-white border-b">
    <div class="mx-auto max-w-6xl px-4">
        <div class="flex h-16 items-center justify-between">
            <!-- Left -->
            <div class="flex items-center gap-8">
                <a href="{% url 'home' %}" class="flex items-center gap-2 font-semibold">
                    <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-blue-600 text-white">J</span>
                    <span>JobBoard</span>
                </a>

                <nav class="hidden sm:flex items-center gap-6 text-sm text-gray-600 ">
                    <a href="{% url 'job_list' %}" class="hover:text-gray-900">Jobs</a>
                    <a href="{% url 'company' %}" class="hover:text-gray-900">Companies</a>
                </nav>
            </div>

            <!-- Right -->
            <div class="flex items-center gap-3">
                {% if user.is_authenticated %}

                    <a href="{% url 'profil' %}"
                       class="text-sm text-gray-600 hover:text-gray-900">
                        Profil
                    </a>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit"
                                class="text-sm text-gray-600 hover:text-gray-900">
                            Logout
                        </button>
                    </form>

                    <a href="{% url 'job_create' %}"
                       class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">
                        Post a job
                    </a>

                {% else %}

                    <a href="{% url 'login' %}"
                       class="text-sm text-gray-600 hover:text-gray-900">
                        Login
                    </a>

                    <a href=""
                       class="text-sm text-gray-600 hover:text-gray-900">
                    Register
                    </a>

                {% endif %}

            </div>
        </div>
    </div>
</header>

<!-- PAGE -->
<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
