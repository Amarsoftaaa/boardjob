{% extends "board/base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10">
    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6">

        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Send message</h2>
            <p class="text-sm text-gray-500 mt-1">
                Write your message and send it directly.
            </p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                {{ form.content }}
                {% if form.content.errors %}
                    <p class="text-red-500 text-sm mt-2">
                        {{ form.content.errors|join:", " }}
                    </p>
                {% endif %}
            </div>

            <div class="flex justify-end">
                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-xl transition duration-200"
                >
                    Send
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
