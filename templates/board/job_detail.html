{% extends "board/base.html" %}
{% load static %}

{% block title %}Job Detail{% endblock %}

{% block content %}

    <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

        <h1 class="text-3xl font-bold mb-4">{{ job.title }}</h1>

        <p class="text-gray-500 mb-2">{{ job.location }}</p>

        <p class="mb-6">{{ job.description }}</p>

        <p class="mb-6">{{ job.job_type }}</p>


        <p class="mb-6">{{ job.employment_type }}</p>


        <p class="text-xl font-semibold">{{ job.salary }} €</p>


        <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href={% url 'job_aplication' %}
               class="w-full sm:w-auto rounded-lg bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow hover:bg-blue-700">
                Prijavi me
            </a>

        </div>

{% endblock %}
