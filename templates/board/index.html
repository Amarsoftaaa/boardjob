{% extends "board/base.html" %}

{% block title %}Home • JobBoard{% endblock %}

{% block content %}
<section class="mx-auto max-w-6xl px-4">
  <div class="py-16 sm:py-24 text-center">

    <!-- Big headline like your screenshot -->
    <h1 class="text-4xl sm:text-6xl font-extrabold tracking-tight text-gray-700">
      The best offer on the market
      <span class="block text-blue-600">for your career</span>
    </h1>

    <p class="mx-auto mt-5 max-w-2xl text-base sm:text-lg text-gray-500">
      Search developer jobs by keyword and location. Simple, fast, server-rendered.
    </p>

    <!-- CTA buttons -->
    <div class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="{% url 'job_list' %}"
         class="w-full sm:w-auto rounded-lg bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow hover:bg-blue-700">
        Browse jobs
      </a>

    </div>

    <!-- Search bar (optional but perfect for job board) -->
    <div class="mx-auto mt-10 max-w-3xl">
      <form method="GET" action="{% url 'job_list' %}"
            class="flex flex-col sm:flex-row gap-3 rounded-2xl bg-white p-3 shadow-sm ring-1 ring-gray-200">

        <input
          type="text"
          name="q"
          value = "{{ request.GET.q }}"
          placeholder="Keyword (e.g. Python, QA, React)"
          class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100"
        />

        <input
          type="text"
          name="location"
          value = "{{ request.GET.location }}"
          placeholder="Location (e.g. Belgrade, Remote)"
          class="w-full rounded-xl border border-gray-200 px-4 py-3 text-sm outline-none focus:border-blue-300 focus:ring-2 focus:ring-blue-100"
        />

        <button
          type="submit"
          class="rounded-xl bg-gray-900 px-5 py-3 text-sm font-semibold text-white hover:bg-black"
        >
          Search
        </button>
      </form>

      <!-- Quick filters (pure links) -->
      <div class="mt-4 flex flex-wrap justify-center gap-2 text-sm">
        <a class="rounded-full bg-white px-4 py-2 ring-1 ring-gray-200 hover:bg-gray-50"
           href="{% url 'job_list' %}?job_type=remote">Remote</a>
        <a class="rounded-full bg-white px-4 py-2 ring-1 ring-gray-200 hover:bg-gray-50"
           href="{% url 'job_list' %}?job_type=hybrid">Hybrid</a>
        <a class="rounded-full bg-white px-4 py-2 ring-1 ring-gray-200 hover:bg-gray-50"
           href="{% url 'job_list' %}?employment_type=full_time">Full-time</a>
      </div>
    </div>

  </div>
</section>
{% endblock %}
