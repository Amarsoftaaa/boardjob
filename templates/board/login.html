{% extends "board/base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 py-16 px-4">
  <div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
      <h1 class="text-2xl font-bold text-slate-800 text-center mb-6">Login</h1>

      {% if form.errors %}
        <div class="mb-4 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
          Username or password is incorrect.
        </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
          <input
            type="text"
            name="username"
            required
            autofocus
            class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            placeholder="npr. amar123"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
          <input
            type="password"
            name="password"
            required
            class="w-full rounded-lg border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
            placeholder="••••••••"
          />
        </div>

        {# Django LoginView podržava redirect parametar "next" #}
        {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <button type="submit"
          class="w-full rounded-lg bg-indigo-600 py-3 font-semibold text-white shadow-md hover:bg-indigo-700 transition">
          Uloguj se
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
